name: Build and deploy

on:
  push:
    branches:
      - main
      - claude/sokol-wasm-github-pages-W5G4n
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          actions-cache-folder: emsdk-cache

      - name: Cache Emscripten system libraries
        uses: actions/cache@v4
        with:
          path: ~/.emscripten_cache
          key: emscripten-cache-${{ runner.os }}-3.1.64-${{ hashFiles('build.sh') }}
          restore-keys: |
            emscripten-cache-${{ runner.os }}-3.1.64-

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-emcc-3.1.64
          variant: ccache

      - name: Verify emcc
        run: emcc --version

      - name: Build
        env:
          EM_COMPILER_WRAPPER: ccache
        run: ./build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
