<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>your sokol fractal</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05060a;
      color: #d8d8d8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    canvas#canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      outline: none;
      touch-action: none;
    }
    #status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: opacity 350ms ease;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    #status.hidden { opacity: 0; }
    #motion-gate {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      background: rgba(15, 18, 24, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      color: #d8e0e6;
      font-size: 13px;
      letter-spacing: 0.4px;
      cursor: pointer;
      z-index: 10;
      transition: opacity 250ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    #motion-gate:active { background: rgba(35, 40, 52, 0.95); }
    #motion-gate.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="status">computing your fractal…</div>
  <button id="motion-gate" class="hidden" type="button">tap to enable shake-to-switch</button>

  <script>
    // Per-client fingerprint -> 32-bit seed, written into the URL query string
    // so sokol_args can read it on the C side. If a `seed` param is already
    // present (shared link) we leave it alone.
    function cyrb53(str, seed) {
      var h1 = 0xdeadbeef ^ (seed >>> 0);
      var h2 = 0x41c6ce57 ^ (seed >>> 0);
      for (var i = 0; i < str.length; i++) {
        var ch = str.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
      }
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      return (h1 >>> 0);
    }

    function gpuShortName() {
      try {
        var c = document.createElement('canvas');
        var gl = c.getContext('webgl2') || c.getContext('webgl');
        if (!gl) return 'no-webgl';
        var ext = gl.getExtension('WEBGL_debug_renderer_info');
        var raw = ext ? (gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '') : '';
        if (!raw) return 'unknown-gpu';
        var m = raw.match(/ANGLE \(([^,]+),\s*([^,]+)/);
        var s = m ? (m[1] + '/' + m[2]) : raw;
        return s.replace(/\s+/g, ' ').trim().slice(0, 64);
      } catch (e) { return 'err-gpu'; }
    }

    (function () {
      var params = new URLSearchParams(location.search);
      if (!params.get('seed')) {
        var fp = [
          navigator.userAgent || '',
          (screen.width || 0) + 'x' + (screen.height || 0) + '@' + (window.devicePixelRatio || 1),
          (Intl.DateTimeFormat().resolvedOptions().timeZone) || '',
          navigator.language || '',
          gpuShortName()
        ].join('|');
        var h = cyrb53(fp, 0);
        params.set('seed', ('00000000' + h.toString(16)).slice(-8));
      }
      if (!params.get('gpu')) params.set('gpu', gpuShortName());
      var qs = '?' + params.toString();
      if (qs !== location.search) {
        history.replaceState(null, '', qs + location.hash);
      }
    })();

    var statusEl = document.getElementById('status');
    var Module = {
      // Sokol's sargs_setup() reads location.search on the emscripten target.
      canvas: (function () { return document.getElementById('canvas'); })(),
      print: function (text) { console.log(text); },
      printErr: function (text) { console.error(text); },
      setStatus: function (text) {
        if (!text) {
          statusEl.classList.add('hidden');
        } else {
          statusEl.classList.remove('hidden');
          statusEl.textContent = text;
        }
      },
      onRuntimeInitialized: function () {
        Module.setStatus('');
      },
    };
    window.onerror = function (msg) {
      Module.setStatus('error — see console');
      console.error(msg);
    };

    // Shake the device -> jump to a new fractal. Calls into the wasm-exported
    // next_fractal() once the runtime is up. iOS Safari requires
    // DeviceMotionEvent.requestPermission() to be invoked from the click
    // handler of an explicit user-tapped element — Sokol's canvas eats the
    // touchstart before it bubbles, so we use a small dedicated button.
    (function () {
      var gateEl = document.getElementById('motion-gate');
      var lastA = null;
      var lastShakeAt = 0;
      var attached = false;
      var SHAKE_THRESHOLD = 22;       // m/s^2 magnitude on the per-event delta
      var SHAKE_DEBOUNCE_MS = 700;
      function onMotion(e) {
        var a = e.accelerationIncludingGravity || e.acceleration;
        if (!a || a.x == null) return;
        if (lastA) {
          var dx = a.x - lastA.x, dy = a.y - lastA.y, dz = a.z - lastA.z;
          var delta = Math.sqrt(dx*dx + dy*dy + dz*dz);
          var now = Date.now();
          if (delta > SHAKE_THRESHOLD && now - lastShakeAt > SHAKE_DEBOUNCE_MS) {
            lastShakeAt = now;
            try { if (Module && Module._next_fractal) Module._next_fractal(); }
            catch (err) { console.error(err); }
          }
        }
        lastA = { x: a.x, y: a.y, z: a.z };
      }
      function attach() {
        if (attached) return;
        attached = true;
        window.addEventListener('devicemotion', onMotion, { passive: true });
        gateEl.classList.add('hidden');
        console.log('[fractal] devicemotion listener attached');
      }
      var hasMotion = typeof DeviceMotionEvent !== 'undefined';
      var needsPermission = hasMotion && typeof DeviceMotionEvent.requestPermission === 'function';
      if (!hasMotion) {
        // No DeviceMotion at all (desktop without sensor, etc.). Nothing to do.
      } else if (!needsPermission) {
        // Android, older iOS — listener can be attached unconditionally.
        attach();
      } else {
        // iOS 13+. requestPermission must run inside a real user click.
        gateEl.classList.remove('hidden');
        gateEl.addEventListener('click', function () {
          DeviceMotionEvent.requestPermission().then(function (r) {
            if (r === 'granted') {
              attach();
            } else {
              gateEl.textContent = 'motion access denied — check Safari → Motion settings';
            }
          }).catch(function (err) {
            console.error('[fractal] requestPermission rejected:', err);
            gateEl.textContent = 'could not enable motion';
          });
        });
      }
    })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
